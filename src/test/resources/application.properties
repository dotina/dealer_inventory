spring.application.name=dealer_inventory

# ── H2 in-memory for tests ─────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Disable Liquibase in tests ──────────────────────────────
spring.liquibase.enabled=false

# ── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=*
app.cors.allowed-methods=GET,POST,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=X-Tenant-Id,X-Role,Content-Type
app.cors.max-age=3600

# ── Rate limiting (disabled for most tests) ─────────────────
app.rate-limit.enabled=false
app.rate-limit.requests-per-second=100
app.rate-limit.bucket-capacity=200

