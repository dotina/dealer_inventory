databaseChangeLog:
  - changeSet:
      id: 001-create-dealers-table
      author: dealer-inventory
      changes:
        - createTable:
            tableName: dealers
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: subscription_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamptz
              - column:
                  name: deleted_by
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_dealers_tenant_id
            tableName: dealers
            columns:
              - column:
                  name: tenant_id
        - addUniqueConstraint:
            tableName: dealers
            columnNames: email, tenant_id
            constraintName: uq_dealers_email_tenant

