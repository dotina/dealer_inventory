databaseChangeLog:
  - changeSet:
      id: 002-create-vehicles-table
      author: dealer-inventory
      changes:
        - createTable:
            tableName: vehicles
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: dealer_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamptz
              - column:
                  name: deleted_by
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: vehicles
            baseColumnNames: dealer_id
            referencedTableName: dealers
            referencedColumnNames: id
            constraintName: fk_vehicles_dealer
            onDelete: NO ACTION
        - createIndex:
            indexName: idx_vehicles_tenant_id
            tableName: vehicles
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            indexName: idx_vehicles_dealer_id
            tableName: vehicles
            columns:
              - column:
                  name: dealer_id

