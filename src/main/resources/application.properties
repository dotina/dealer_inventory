spring.application.name=dealer_inventory

# ── PostgreSQL ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5433/dealer_inventory
spring.datasource.username=dealer_user
spring.datasource.password=dealer_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Liquibase ──────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ── CORS ───────────────────────────────────────────────────
app.cors.allowed-origins=*
app.cors.allowed-methods=GET,POST,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=X-Tenant-Id,X-Role,Content-Type,Authorization
app.cors.max-age=3600

# ── Rate Limiting (per-tenant) ─────────────────────────────
app.rate-limit.enabled=true
app.rate-limit.requests-per-second=100
app.rate-limit.bucket-capacity=200

# ── Async executor (audit writes) ─────────────────────────
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=audit-
